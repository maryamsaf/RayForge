<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refactr Medic — 3D Model Viewer</title>
<style>
  :root {
    --red: #E8251A;
    --dark-red: #C01A10;
    --black: #0e0e0e;
    --off-white: #F4F3F0;
    --card-bg: #ECEAE6;
  }

  *, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  html, body {
    height: 100%;
  }

  body {
    background: var(--off-white);
    color: var(--black);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 48px;
    height: 64px;
    background: rgba(244, 243, 240, 0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--black);
  }

  .logo-img {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .logo-img img {
    width: 32px;
    height: 32px;
    object-fit: contain;
  }

  .logo-text {
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.3px;
  }

  .logo-text span { color: var(--red); }

  .nav-links {
    display: flex;
    gap: 40px;
    list-style: none;
  }

  .nav-links a {
    text-decoration: none;
    color: var(--black);
    font-size: 14px;
    font-weight: 400;
    opacity: 0.7;
    transition: opacity 0.2s;
  }

  .nav-links a:hover { opacity: 1; }

  .nav-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn-login {
    padding: 8px 20px;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-login:hover { background: var(--dark-red); }

  .btn-signup {
    padding: 8px 20px;
    background: transparent;
    color: var(--black);
    border: 1.5px solid rgba(0, 0, 0, 0.2);
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  .btn-signup:hover {
    border-color: var(--black);
    background: rgba(0, 0, 0, 0.04);
  }

  .page {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 32px 48px 40px;
    gap: 20px;
    min-height: 0;
  }

  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .page-title {
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -0.8px;
    color: var(--black);
  }

  .page-title span { color: var(--red); }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #777;
    text-decoration: none;
    opacity: 0.7;
    transition: opacity 0.2s;
  }

  .back-link:hover { opacity: 1; }

  .back-link svg {
    width: 14px; height: 14px;
    stroke: currentColor; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }

  /* ── viewer window ── */
  .viewer-window {
    flex: 1;
    background: #111111;
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 500px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
  }

  .window-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    background: rgba(255, 255, 255, 0.035);
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    flex-shrink: 0;
  }

  .window-dots { display: flex; gap: 6px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot-r { background: var(--red); }
  .dot-y { background: #f59e0b; }
  .dot-g { background: #22c55e; }

  .window-title {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.25);
    letter-spacing: 0.04em;
    font-family: 'Courier New', monospace;
  }

  .window-bar-spacer { flex: 1; min-width: 8px; }

  .window-bar-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .window-live {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.28);
  }

  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #22c55e;
    animation: blink 1.8s infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  .local-obj-btn {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.55);
    cursor: pointer;
    text-decoration: underline;
    user-select: none;
  }

  .local-obj-btn:hover { color: rgba(255, 255, 255, 0.92); }

  /* ── canvas area ── */
  .canvas-area {
    flex: 1;
    position: relative;
    min-height: 0;
    width: 100%;
  }

  #viewerCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    outline: none;
  }

  .empty-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    pointer-events: none;
    user-select: none;
  }

  .empty-state svg {
    width: 48px; height: 48px;
    stroke: rgba(255,255,255,0.25); fill: none;
    stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round;
  }

  .empty-state p {
    font-size: 13px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.04em;
  }

  .viewer-overlay {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.6);
    color: rgba(255, 255, 255, 0.85);
    font-size: 14px;
    text-align: center;
    padding: 24px;
  }

  /* ── fullscreen button (offset so it clears the side toolbar) ── */
  .fullscreen-btn {
    position: absolute;
    bottom: 16px;
    right: 72px;
    z-index: 20;
    width: 36px;
    height: 36px;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, border-color 0.2s;
    backdrop-filter: blur(4px);
  }

  .fullscreen-btn:hover {
    background: rgba(255, 255, 255, 0.2);
    border-color: rgba(255, 255, 255, 0.35);
  }

  .fullscreen-btn svg {
    width: 16px; height: 16px;
    stroke: rgba(255,255,255,0.75); fill: none;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
  }

  /* ── side viewer controls (zoom / orbit) ── */
  .viewer-toolbar {
    position: absolute;
    top: 50%;
    right: 16px;
    transform: translateY(-50%);
    z-index: 22;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 10px 8px;
    background: rgba(0, 0, 0, 0.35);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 12px;
    backdrop-filter: blur(8px);
    pointer-events: auto;
  }

  .viewer-tool-btn {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 10px;
    cursor: pointer;
    color: rgba(255, 255, 255, 0.88);
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
  }

  .viewer-tool-btn:hover {
    background: rgba(255, 255, 255, 0.16);
    border-color: rgba(255, 255, 255, 0.28);
  }

  .viewer-tool-btn:active {
    transform: scale(0.96);
  }

  .viewer-tool-btn svg {
    width: 20px;
    height: 20px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.85;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .viewer-toolbar-hint {
    font-size: 9px;
    line-height: 1.25;
    color: rgba(255, 255, 255, 0.38);
    text-align: center;
    max-width: 52px;
    user-select: none;
    letter-spacing: 0.02em;
    padding-top: 2px;
  }

  /* ── fullscreen adjustments ── */
  :fullscreen .canvas-area,
  :-webkit-full-screen .canvas-area,
  :-moz-full-screen .canvas-area {
    background: #111111;
  }

  :fullscreen .viewer-window,
  :-webkit-full-screen .viewer-window,
  :-moz-full-screen .viewer-window {
    border-radius: 0;
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>

<body>

<nav>
  <a href="refactr-medic.html" class="logo">
    <div class="logo-img">
      <img src="images/logo.png" alt="Refactr Medic Logo" />
    </div>
    <span class="logo-text">Refactr<span> Medic</span></span>
  </a>

  <ul class="nav-links">
    <li><a href="refactr-medic.html">Home</a></li>
    <li><a href="refactr-medic.html#about">About</a></li>
    <li><a href="#">Products</a></li>
    <li><a href="refactr-medic.html#services">Services</a></li>
    <li><a href="#">Contact</a></li>
  </ul>

  <div class="nav-actions">
    <button class="btn-login" onclick="location.href='login.html'">Login</button>
    <button class="btn-signup" onclick="location.href='register.html'">Sign Up</button>
  </div>
</nav>

<div class="page">

  <div class="page-header">
    <h1 class="page-title">Generate <span>3D Model</span></h1>
    <a href="upload-ct-scan.html" class="back-link">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back to upload
    </a>
  </div>

  <div class="viewer-window" id="viewerWindow">

    <div class="window-bar">
      <div class="window-dots">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
      </div>
      <span class="window-title">3d_model_renderer — WebGL</span>
      <div class="window-bar-spacer" aria-hidden="true"></div>
      <div class="window-bar-right">
        <label class="local-obj-btn" for="localObjFile">Open local .obj…</label>
        <input type="file" id="localObjFile" accept=".obj,.OBJ,text/plain" hidden />
        <div class="window-live">
          <div class="live-dot"></div>
          <span id="liveStatusLabel">Ready</span>
        </div>
      </div>
    </div>

    <div class="canvas-area" id="canvasArea">
      <canvas id="viewerCanvas"></canvas>

      <div class="empty-state" id="viewerPlaceholder">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        <p id="viewerPlaceholderText">3D model will render here</p>
      </div>

      <div class="viewer-overlay" id="viewerOverlay" style="display:none;">
        <span id="viewerOverlayText">Loading…</span>
      </div>

      <!-- side navigation: zoom + orbit (mouse wheel also zooms via OrbitControls) -->
      <div class="viewer-toolbar" id="viewerToolbar" aria-label="3D view controls">
        <button type="button" class="viewer-tool-btn" id="zoomInBtn" title="Zoom in" aria-label="Zoom in">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="7"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            <line x1="11" y1="8" x2="11" y2="14"/>
            <line x1="8" y1="11" x2="14" y2="11"/>
          </svg>
        </button>
        <button type="button" class="viewer-tool-btn" id="zoomOutBtn" title="Zoom out" aria-label="Zoom out">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="7"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            <line x1="8" y1="11" x2="14" y2="11"/>
          </svg>
        </button>
        <button type="button" class="viewer-tool-btn" id="rotateLeftBtn" title="Orbit left" aria-label="Rotate view left">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2.5 12A9.5 9.5 0 0 1 12 2.5v3"/>
            <polyline points="8 6 12 2.5 15.5 6"/>
            <circle cx="12" cy="13" r="4" opacity="0.35"/>
          </svg>
        </button>
        <button type="button" class="viewer-tool-btn" id="rotateRightBtn" title="Orbit right" aria-label="Rotate view right">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21.5 12A9.5 9.5 0 0 0 12 2.5v3"/>
            <polyline points="16 6 12 2.5 8.5 6"/>
            <circle cx="12" cy="13" r="4" opacity="0.35"/>
          </svg>
        </button>
        <span class="viewer-toolbar-hint">Scroll · drag to rotate</span>
      </div>

      <!-- fullscreen button -->
      <button class="fullscreen-btn" id="fullscreenBtn" title="Fullscreen (F11 / Esc to exit)">
        <svg id="fsIcon" viewBox="0 0 24 24">
          <polyline points="15 3 21 3 21 9"/>
          <polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/>
          <line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
    </div>

  </div>

</div>

<script>
(function () {
  var API = "http://127.0.0.1:8000";
  var viewerCtx = null;

  /* ── status helpers ── */
  function setLive(text) {
    var el = document.getElementById("liveStatusLabel");
    if (el) el.textContent = text;
  }

  function showOverlay(msg) {
    var o = document.getElementById("viewerOverlay");
    var t = document.getElementById("viewerOverlayText");
    o.style.display = "flex";
    t.textContent = msg;
  }

  function hideOverlay() {
    document.getElementById("viewerOverlay").style.display = "none";
  }

  function showPlaceholder(msg) {
    document.getElementById("viewerPlaceholder").style.display = "flex";
    document.getElementById("viewerPlaceholderText").textContent = msg;
  }

  function hidePlaceholder() {
    document.getElementById("viewerPlaceholder").style.display = "none";
  }

  /* ── fetch helper ── */
  function fetchWithTimeout(url, options, ms) {
    var ctrl = new AbortController();
    var id = setTimeout(function () { ctrl.abort(); }, ms);
    return fetch(url, Object.assign({}, options, { signal: ctrl.signal }))
      .finally(function () { clearTimeout(id); });
  }

  function fetchScan(scanId, token) {
    return fetchWithTimeout(
      API + "/ct-scans/" + encodeURIComponent(scanId),
      { headers: { Authorization: "Bearer " + token } },
      60000
    ).then(function (res) {
      if (res.status === 401) return { unauthorized: true };
      if (!res.ok) return { error: "Scan request failed (" + res.status + ")" };
      return res.json();
    });
  }

  /* ── three.js helpers ── */
  function fitCameraToObject(camera, controls, object, margin) {
    margin = margin == null ? 1.35 : margin;
    var box = new THREE.Box3().setFromObject(object);
    var size = box.getSize(new THREE.Vector3());
    var center = box.getCenter(new THREE.Vector3());
    var maxDim = Math.max(size.x, size.y, size.z) || 1;
    var dist = maxDim * margin;
    camera.position.set(center.x + dist * 0.6, center.y + dist * 0.45, center.z + dist * 0.6);
    camera.near = Math.max(0.01, dist / 200);
    camera.far = dist * 50;
    camera.updateProjectionMatrix();
    controls.target.copy(center);
    controls.update();
  }

  function disposeObject3D(root) {
    root.traverse(function (ch) {
      if (ch.geometry) ch.geometry.dispose();
      if (ch.material) {
        if (Array.isArray(ch.material)) ch.material.forEach(function (m) { m.dispose(); });
        else ch.material.dispose();
      }
    });
  }

  function clearMeshRoot(meshRoot) {
    while (meshRoot.children.length) {
      var o = meshRoot.children[0];
      meshRoot.remove(o);
      disposeObject3D(o);
    }
  }

  /* ── init three.js viewer ── */
  function ensureViewer() {
    if (viewerCtx) return viewerCtx;

    var canvas = document.getElementById("viewerCanvas");
    var canvasArea = document.getElementById("canvasArea");

    var scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    var camera = new THREE.PerspectiveCamera(45, 1, 0.1, 200000);
    var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: false });
    if (!renderer.getContext()) throw new Error("WebGL not available");
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

    var controls = new THREE.OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;

    scene.add(new THREE.HemisphereLight(0x9bb0ff, 0x222222, 0.85));
    var dir = new THREE.DirectionalLight(0xffffff, 1.1);
    dir.position.set(4, 10, 6);
    scene.add(dir);

    var meshRoot = new THREE.Group();
    scene.add(meshRoot);

    function resize() {
      var w = Math.max(1, Math.floor(canvasArea.clientWidth));
      var h = Math.max(1, Math.floor(canvasArea.clientHeight));
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }

    resize();
    window.addEventListener("resize", resize);
    /* also handle fullscreen resize */
    document.addEventListener("fullscreenchange", function () { setTimeout(resize, 80); });
    document.addEventListener("webkitfullscreenchange", function () { setTimeout(resize, 80); });

    (function tick() {
      requestAnimationFrame(tick);
      controls.update();
      renderer.render(scene, camera);
    })();

    viewerCtx = { scene, camera, renderer, controls, meshRoot, resize };
    return viewerCtx;
  }

  /* Dolly camera toward / away from OrbitControls target (same idea as scroll-zoom). */
  function viewerDolly(factor) {
    var ctx = viewerCtx;
    if (!ctx) return;
    var cam = ctx.camera;
    var controls = ctx.controls;
    var target = controls.target;
    var offset = new THREE.Vector3().subVectors(cam.position, target);
    var len = offset.length();
    if (len < 1e-6) return;
    var next = len * factor;
    var minDist = Math.max(0.02, len * 0.02);
    var maxDist = len * 80;
    if (next < minDist) next = minDist;
    if (next > maxDist) next = maxDist;
    offset.normalize().multiplyScalar(next);
    cam.position.copy(target).add(offset);
    controls.update();
  }

  /* Orbit camera around world Y through the target (toolbar “rotate”). */
  function viewerOrbitYaw(angleRad) {
    var ctx = viewerCtx;
    if (!ctx) return;
    var cam = ctx.camera;
    var controls = ctx.controls;
    var target = controls.target;
    var offset = new THREE.Vector3().subVectors(cam.position, target);
    var axis = new THREE.Vector3(0, 1, 0);
    offset.applyAxisAngle(axis, angleRad);
    cam.position.copy(target).add(offset);
    cam.lookAt(target);
    controls.update();
  }

  function wireViewerToolbar() {
    var zIn = document.getElementById("zoomInBtn");
    var zOut = document.getElementById("zoomOutBtn");
    var rL = document.getElementById("rotateLeftBtn");
    var rR = document.getElementById("rotateRightBtn");
    if (!zIn || !zOut || !rL || !rR) return;

    var step = 0.88;
    var stepOut = 1 / step;
    var yaw = (18 * Math.PI) / 180;

    zIn.addEventListener("click", function () { viewerDolly(step); });
    zOut.addEventListener("click", function () { viewerDolly(stepOut); });
    rL.addEventListener("click", function () { viewerOrbitYaw(yaw); });
    rR.addEventListener("click", function () { viewerOrbitYaw(-yaw); });
  }

  function applyLungMaterial(mesh) {
    mesh.traverse(function (child) {
      if (child instanceof THREE.Mesh) {
        child.material = new THREE.MeshStandardMaterial({
          color: 0xc8dff0,
          metalness: 0.05,
          roughness: 0.45,
          flatShading: false,
          side: THREE.DoubleSide
        });
      }
    });
  }

  function loadObjTextIntoViewer(objText, label) {
    showOverlay("Parsing mesh…" + (label ? " (" + label + ")" : ""));
    return new Promise(function (resolve, reject) {
      setTimeout(function () {
        try {
          var ctx = ensureViewer();
          clearMeshRoot(ctx.meshRoot);

          var mesh = new THREE.OBJLoader().parse(objText);
          applyLungMaterial(mesh);
          ctx.meshRoot.add(mesh);
          fitCameraToObject(ctx.camera, ctx.controls, mesh);

          hidePlaceholder();
          ctx.resize();
          hideOverlay();
          setLive(label ? ("Viewer — " + label) : "Viewer");
          resolve();
        } catch (e) {
          reject(e);
        }
      }, 40);
    });
  }

  /* ── fullscreen ── */
  function enterFullscreen() {
    var el = document.getElementById("viewerWindow");
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
  }

  function exitFullscreen() {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
  }

  function isFullscreen() {
    return !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement);
  }

  /* swap icon between expand / compress */
  function updateFsIcon() {
    var icon = document.getElementById("fsIcon");
    if (isFullscreen()) {
      icon.innerHTML =
        '<polyline points="4 14 10 14 10 20"/>' +
        '<polyline points="20 10 14 10 14 4"/>' +
        '<line x1="10" y1="14" x2="3" y2="21"/>' +
        '<line x1="21" y1="3" x2="14" y2="10"/>';
    } else {
      icon.innerHTML =
        '<polyline points="15 3 21 3 21 9"/>' +
        '<polyline points="9 21 3 21 3 15"/>' +
        '<line x1="21" y1="3" x2="14" y2="10"/>' +
        '<line x1="3" y1="21" x2="10" y2="14"/>';
    }
  }

  document.addEventListener("fullscreenchange", updateFsIcon);
  document.addEventListener("webkitfullscreenchange", updateFsIcon);
  document.addEventListener("mozfullscreenchange", updateFsIcon);

  /* Esc is handled natively by the browser for fullscreen — no extra listener needed */
  document.getElementById("fullscreenBtn").addEventListener("click", function () {
    if (isFullscreen()) exitFullscreen();
    else enterFullscreen();
  });

  /* ── drag & drop ── */
  function wireCanvasAreaDrop(canvasArea, onText) {
    ["dragenter", "dragover"].forEach(function (ev) {
      canvasArea.addEventListener(ev, function (e) { e.preventDefault(); e.stopPropagation(); });
    });
    canvasArea.addEventListener("drop", function (e) {
      e.preventDefault(); e.stopPropagation();
      var f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      if (!f) return;
      var r = new FileReader();
      r.onload = function () { onText(r.result, f.name || "mesh.obj"); };
      r.onerror = function () { showPlaceholder("Could not read file."); setLive("Error"); };
      r.readAsText(f);
    });
  }

  /* ── main ── */
  function main() {
    if (typeof THREE === "undefined") {
      showPlaceholder("Three.js failed to load from the CDN. Check your network.");
      setLive("Error");
      return;
    }

    /* init viewer immediately so canvas fills the area */
    try { ensureViewer(); } catch (e) {
      showPlaceholder("WebGL not available in this browser.");
      setLive("Error");
      return;
    }

    wireViewerToolbar();

    var localInput = document.getElementById("localObjFile");
    var canvasArea = document.getElementById("canvasArea");

    function handleLocalObjText(text, name) {
      loadObjTextIntoViewer(text, name).catch(function (e) {
        console.error(e);
        hideOverlay();
        showPlaceholder("Could not parse OBJ: " + ((e && e.message) ? e.message : String(e)));
        setLive("Error");
      });
    }

    localInput.addEventListener("change", function () {
      var f = localInput.files && localInput.files[0];
      localInput.value = "";
      if (!f) return;
      var r = new FileReader();
      r.onload = function () { handleLocalObjText(r.result, f.name); };
      r.onerror = function () { showPlaceholder("Could not read file."); setLive("Error"); };
      r.readAsText(f);
    });

    wireCanvasAreaDrop(canvasArea, handleLocalObjText);

    /* ── scan from URL ── */
    var params = new URLSearchParams(window.location.search);
    var scanId = params.get("scan_id");

    if (!scanId) {
      showPlaceholder(
        'No scan in the URL. Use "Open local .obj…" or drag a saved lung mesh here, ' +
        'or open this page with ?scan_id=… after upload.'
      );
      setLive("Local / idle");
      hideOverlay();
      return;
    }

    var token = localStorage.getItem("access_token");
    if (!token) { window.location.href = "login.html"; return; }

    showOverlay("Loading scan…");
    setLive("Loading");

    fetchScan(scanId, token)
      .then(function (info) {
        if (info.unauthorized) { localStorage.removeItem("access_token"); window.location.href = "login.html"; return null; }
        if (info.error) { hideOverlay(); showPlaceholder(info.error); setLive("Error"); return null; }
        return info;
      })
      .then(function (info) {
        if (!info) return null;
        var pollDeadline = Date.now() + 58 * 60 * 1000;
        var pollStarted = Date.now();
        var tick = 0;

        function poll() {
          if (info.status !== "processing" || Date.now() >= pollDeadline) return Promise.resolve(info);
          var sec = Math.floor((Date.now() - pollStarted) / 1000);
          showOverlay("Reconstructing mesh… (" + sec + "s)");
          return new Promise(function (r) { setTimeout(r, 2000); })
            .then(function () { return fetchScan(scanId, token); })
            .then(function (next) {
              if (!next || next.unauthorized) { localStorage.removeItem("access_token"); window.location.href = "login.html"; return null; }
              if (next.error) return Promise.reject(new Error(next.error));
              info = next;
              tick++;
              if (tick % 5 === 0) showOverlay("Still working — large scans can take several minutes…");
              return poll();
            });
        }
        return poll();
      })
      .then(function (info) {
        if (!info || info.unauthorized) return;
        if (info.status !== "completed" || !info.model_url) {
          hideOverlay();
          var msg;
          if (info.status === "failed") msg = info.processing_error || "Reconstruction failed.";
          else if (info.status === "processing") msg = "Reconstruction is taking longer than expected. Refresh in a minute.";
          else msg = 'Model not ready. Go back to Upload and run "Process & Generate 3D Model".';
          showPlaceholder(msg);
          setLive("Idle");
          return;
        }

        var meshUrl = API + "/ct-scans/" + encodeURIComponent(scanId) + "/mesh-obj";
        showOverlay("Downloading mesh…");

        return fetchWithTimeout(meshUrl, {
          mode: "cors",
          credentials: "omit",
          headers: { Authorization: "Bearer " + token }
        }, 600000)
          .then(function (res) {
            if (!res.ok) throw new Error("Mesh HTTP " + res.status);
            return res.text();
          })
          .then(function (objText) {
            return loadObjTextIntoViewer(objText, null);
          });
      })
      .catch(function (e) {
        console.error(e);
        hideOverlay();
        showPlaceholder("Viewer error: " + ((e && e.message) ? e.message : String(e)));
        setLive("Error");
      });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", main);
  } else {
    main();
  }
})();
</script>

</body>
</html>
