<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refactr Medic — 3D Model Viewer</title>
<style>
  :root {
    --red: #E8251A;
    --dark-red: #C01A10;
    --black: #0e0e0e;
    --off-white: #F4F3F0;
    --card-bg: #ECEAE6;
  }

  *, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  body {
    background: var(--off-white);
    color: var(--black);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 48px;
    height: 64px;
    background: rgba(244, 243, 240, 0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(0, 0, 0, 0.06);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--black);
  }

  .logo-img {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .logo-img img {
    width: 32px;
    height: 32px;
    object-fit: contain;
  }

  .logo-text {
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.3px;
  }

  .logo-text span { color: var(--red); }

  .nav-links {
    display: flex;
    gap: 40px;
    list-style: none;
  }

  .nav-links a {
    text-decoration: none;
    color: var(--black);
    font-size: 14px;
    font-weight: 400;
    opacity: 0.7;
    transition: opacity 0.2s;
  }

  .nav-links a:hover { opacity: 1; }

  .nav-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn-login {
    padding: 8px 20px;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-login:hover { background: var(--dark-red); }

  .btn-signup {
    padding: 8px 20px;
    background: transparent;
    color: var(--black);
    border: 1.5px solid rgba(0, 0, 0, 0.2);
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  .btn-signup:hover {
    border-color: var(--black);
    background: rgba(0, 0, 0, 0.04);
  }

  .page {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 32px 48px 40px;
    gap: 20px;
  }

  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .page-title {
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -0.8px;
    color: var(--black);
  }

  .page-title span { color: var(--red); }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #777;
    text-decoration: none;
    opacity: 0.7;
    transition: opacity 0.2s;
  }

  .back-link:hover { opacity: 1; }

  .back-link svg {
    width: 14px; height: 14px;
    stroke: currentColor; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }

  .viewer-window {
    flex: 1;
    background: #111111;
    border-radius: 16px;
    overflow: hidden;
    min-height: calc(100vh - 230px);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
  }

  .window-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    background: rgba(255, 255, 255, 0.035);
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  }

  .window-dots { display: flex; gap: 6px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot-r { background: var(--red); }
  .dot-y { background: #f59e0b; }
  .dot-g { background: #22c55e; }

  .window-title {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.25);
    letter-spacing: 0.04em;
    font-family: 'Courier New', monospace;
  }

  .window-live {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.28);
  }

  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #22c55e;
    animation: blink 1.8s infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  .canvas-area {
    position: relative;
    width: 100%;
    height: calc(100% - 43px);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    opacity: 0.25;
    pointer-events: none;
    user-select: none;
  }

  .empty-state svg {
    width: 48px; height: 48px;
    stroke: white; fill: none;
    stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round;
  }

  .empty-state p {
    font-size: 13px;
    color: white;
    letter-spacing: 0.04em;
  }

  .viewer-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    outline: none;
  }

  .viewer-overlay {
    position: absolute;
    inset: 0;
    z-index: 4;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.55);
    color: rgba(255, 255, 255, 0.85);
    font-size: 14px;
    text-align: center;
    padding: 24px;
    pointer-events: none;
  }

  #viewerCanvas { z-index: 2; }
  #viewerPlaceholder { z-index: 1; }
</style>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
</head>
<body>

<nav>
  <a href="refactr-medic.html" class="logo">
    <div class="logo-img">
      <img src="images/logo.png" alt="Refactr Medic Logo" />
    </div>
    <span class="logo-text">Refactr<span> Medic</span></span>
  </a>

  <ul class="nav-links">
    <li><a href="refactr-medic.html">Home</a></li>
    <li><a href="refactr-medic.html#about">About</a></li>
    <li><a href="#">Products</a></li>
    <li><a href="refactr-medic.html#services">Services</a></li>
    <li><a href="#">Contact</a></li>
  </ul>

  <div class="nav-actions">
    <button class="btn-login" onclick="location.href='login.html'">Login</button>
    <button class="btn-signup" onclick="location.href='register.html'">Sign Up</button>
  </div>
</nav>

<div class="page">

  <div class="page-header">
    <h1 class="page-title">Generate <span>3D Model</span></h1>
    <a href="upload-ct-scan.html" class="back-link">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back to upload
    </a>
  </div>

  <div class="viewer-window">

    <div class="window-bar">
      <div class="window-dots">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
      </div>
      <span class="window-title">3d_model_renderer — WebGL</span>
      <div class="window-live">
        <div class="live-dot"></div>
        <span id="liveStatusLabel">Ready</span>
      </div>
    </div>

    <div class="canvas-area" id="canvasArea">
      <canvas id="viewerCanvas" class="viewer-canvas" hidden></canvas>
      <div class="empty-state" id="viewerPlaceholder">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        <p id="viewerPlaceholderText">3D model will render here</p>
      </div>
      <div class="viewer-overlay" id="viewerOverlay" hidden>
        <span id="viewerOverlayText">Loading…</span>
      </div>
    </div>

  </div>

</div>

<script>
(function () {
  const API = "http://127.0.0.1:8000";

  function setLive(text) {
    var el = document.getElementById("liveStatusLabel");
    if (el) el.textContent = text;
  }

  function showOverlay(msg) {
    var o = document.getElementById("viewerOverlay");
    var t = document.getElementById("viewerOverlayText");
    o.hidden = false;
    t.textContent = msg;
  }

  function hideOverlay() {
    document.getElementById("viewerOverlay").hidden = true;
  }

  function showPlaceholder(msg) {
    var ph = document.getElementById("viewerPlaceholder");
    var p = document.getElementById("viewerPlaceholderText");
    var cv = document.getElementById("viewerCanvas");
    ph.style.display = "";
    ph.style.opacity = "0.9";
    ph.style.pointerEvents = "auto";
    p.textContent = msg;
    cv.hidden = true;
  }

  function fetchWithTimeout(url, options, ms) {
    var ctrl = new AbortController();
    var id = setTimeout(function () { ctrl.abort(); }, ms);
    return fetch(url, Object.assign({}, options, { signal: ctrl.signal }))
      .finally(function () { clearTimeout(id); });
  }

  function fetchScan(scanId, token) {
    return fetchWithTimeout(
      API + "/ct-scans/" + encodeURIComponent(scanId),
      { headers: { Authorization: "Bearer " + token } },
      60000
    ).then(function (res) {
      if (res.status === 401) return { unauthorized: true };
      if (!res.ok) return { error: "Scan request failed (" + res.status + ")" };
      return res.json();
    });
  }

  function fitCameraToObject(camera, controls, object, margin) {
    margin = margin == null ? 1.35 : margin;
    var box = new THREE.Box3().setFromObject(object);
    var size = box.getSize(new THREE.Vector3());
    var center = box.getCenter(new THREE.Vector3());
    var maxDim = Math.max(size.x, size.y, size.z) || 1;
    var dist = maxDim * margin;
    camera.position.set(center.x + dist * 0.6, center.y + dist * 0.45, center.z + dist * 0.6);
    camera.near = Math.max(0.01, dist / 200);
    camera.far = dist * 50;
    camera.updateProjectionMatrix();
    controls.target.copy(center);
    controls.update();
  }

  function main() {
    if (typeof THREE === "undefined") {
      showPlaceholder("Three.js failed to load from the CDN. Check your network or try Chrome / Edge.");
      setLive("Error");
      return;
    }

    var params = new URLSearchParams(window.location.search);
    var scanId = params.get("scan_id");
    if (!scanId) {
      showPlaceholder("No scan selected. Go back, upload a DICOM ZIP, and run “Process & Generate 3D Model”.");
      setLive("Idle");
      return;
    }

    var token = localStorage.getItem("access_token");
    if (!token) {
      window.location.href = "login.html";
      return;
    }

    showOverlay("Loading scan…");
    setLive("Loading");

    fetchScan(scanId, token)
      .then(function (info) {
        if (info.unauthorized) {
          localStorage.removeItem("access_token");
          window.location.href = "login.html";
          return null;
        }
        if (info.error) {
          hideOverlay();
          showPlaceholder(info.error);
          setLive("Error");
          return null;
        }
        return info;
      })
      .then(function (info) {
        if (!info) return null;

        var pollDeadline = Date.now() + 58 * 60 * 1000;
        var pollStarted = Date.now();
        var tick = 0;

        function poll() {
          if (info.status !== "processing" || Date.now() >= pollDeadline) {
            return Promise.resolve(info);
          }
          var sec = Math.floor((Date.now() - pollStarted) / 1000);
          showOverlay("Reconstructing mesh… (" + sec + "s)");
          return new Promise(function (r) { setTimeout(r, 2000); })
            .then(function () { return fetchScan(scanId, token); })
            .then(function (next) {
              if (!next || next.unauthorized) {
                localStorage.removeItem("access_token");
                window.location.href = "login.html";
                return null;
              }
              if (next.error) {
                return Promise.reject(new Error(next.error));
              }
              info = next;
              tick += 1;
              if (tick % 5 === 0) {
                showOverlay("Still working — large scans can take several minutes…");
              }
              return poll();
            });
        }

        return poll();
      })
      .then(function (info) {
        if (!info) return;
        if (info.unauthorized) return;

        if (info.status !== "completed" || !info.model_url) {
          hideOverlay();
          var msg;
          if (info.status === "failed") {
            msg = info.processing_error || "Reconstruction failed.";
          } else if (info.status === "processing") {
            msg = "Reconstruction is taking longer than expected. Refresh this page in a minute.";
          } else {
            msg = "Model is not ready yet. Go back to Upload and run “Process & Generate 3D Model”.";
          }
          showPlaceholder(msg);
          setLive("Idle");
          return;
        }

        var meshUrl = API + "/ct-scans/" + encodeURIComponent(scanId) + "/mesh-obj";
        showOverlay("Downloading mesh…");

        var canvas = document.getElementById("viewerCanvas");
        var placeholder = document.getElementById("viewerPlaceholder");
        var canvasArea = document.getElementById("canvasArea");

        return fetchWithTimeout(meshUrl, {
          mode: "cors",
          credentials: "omit",
          headers: { Authorization: "Bearer " + token },
        }, 600000)
          .then(function (res) {
            if (!res.ok) throw new Error("Mesh HTTP " + res.status);
            return res.text();
          })
          .then(function (objText) {
            showOverlay("Parsing mesh… (may take a bit for large files)");
            return new Promise(function (resolve) {
              setTimeout(function () { resolve(objText); }, 50);
            });
          })
          .then(function (objText) {
            var scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111);

            var camera = new THREE.PerspectiveCamera(45, 1, 0.1, 200000);
            var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: false });
            if (!renderer.getContext()) {
              throw new Error("WebGL not available");
            }
            renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

            var controls = new THREE.OrbitControls(camera, canvas);
            controls.enableDamping = true;
            controls.dampingFactor = 0.06;

            scene.add(new THREE.HemisphereLight(0x9bb0ff, 0x222222, 0.85));
            var dir = new THREE.DirectionalLight(0xffffff, 1.1);
            dir.position.set(4, 10, 6);
            scene.add(dir);

            function resize() {
              var rect = canvasArea.getBoundingClientRect();
              var w = Math.max(1, Math.floor(rect.width));
              var h = Math.max(1, Math.floor(rect.height));
              renderer.setSize(w, h, false);
              camera.aspect = w / h;
              camera.updateProjectionMatrix();
            }

            var mesh = new THREE.OBJLoader().parse(objText);
            mesh.traverse(function (child) {
              if (child instanceof THREE.Mesh) {
                child.material = new THREE.MeshStandardMaterial({
                  color: 0xc8dff0,
                  metalness: 0.05,
                  roughness: 0.45,
                  flatShading: false,
                  side: THREE.DoubleSide
                });
              }
            });
            scene.add(mesh);
            fitCameraToObject(camera, controls, mesh);

            placeholder.style.display = "none";
            canvas.hidden = false;
            resize();
            window.addEventListener("resize", resize);
            hideOverlay();
            setLive("Viewer");

            function tick() {
              requestAnimationFrame(tick);
              controls.update();
              renderer.render(scene, camera);
            }
            tick();
          });
      })
      .catch(function (e) {
        console.error(e);
        hideOverlay();
        var m = (e && e.message) ? e.message : String(e);
        showPlaceholder("Viewer error: " + m);
        setLive("Error");
      });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", main);
  } else {
    main();
  }
})();
</script>

</body>
</html>
