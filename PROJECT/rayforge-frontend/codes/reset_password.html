<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Refactr Medic</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'DM Sans', sans-serif;
    background: #f5f4f0;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }

  .container {
    background: white;
    padding: 40px;
    border-radius: 16px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.08);
  }

  h2 {
    font-family: 'Syne', sans-serif;
    margin-bottom: 10px;
  }

  p {
    font-size: 0.9rem;
    color: #666;
    margin-bottom: 25px;
  }

  input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    margin-bottom: 15px;
    font-size: 0.9rem;
  }

  button {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: #e8281e;
    color: white;
    font-weight: 600;
    cursor: pointer;
  }

  button:hover {
    background: #c01f17;
  }

  .message {
    font-size: 0.85rem;
    margin-top: 10px;
    color: green;
  }

  .error {
    color: red;
  }
</style>
</head>

<body>

<div class="container">
  <h2>Reset Password</h2>
  <p>Enter your new password below.</p>

  <form id="resetForm">
    <input type="password" id="password" placeholder="New password" required>
    <input type="password" id="confirmPassword" placeholder="Confirm password" required>
    <button type="submit">Update Password</button>
  </form>

  <p id="msg"></p>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get('token');

document.getElementById('resetForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const password = document.getElementById('password').value.trim();
  const confirmPassword = document.getElementById('confirmPassword').value.trim();
  const msg = document.getElementById('msg');

  msg.textContent = "";
  msg.className = "";

  if (!token) {
    msg.textContent = "Invalid or missing token.";
    msg.className = "error";
    return;
  }

  if (password !== confirmPassword) {
    msg.textContent = "Passwords do not match.";
    msg.className = "error";
    return;
  }

  try {
    const formData = new URLSearchParams();
    formData.append("token", token);
    formData.append("new_password", password);

    const response = await fetch("http://127.0.0.1:8000/auth/reset-password", {
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded",
      },
      body: formData
    });

    const data = await response.json();

    if (response.ok) {
      msg.textContent = "Password updated successfully! Redirecting...";
      msg.className = "message";

      setTimeout(() => {
        window.location.href = "login.html";
      }, 2000);
    } else {
      msg.textContent = data.detail || "Something went wrong.";
      msg.className = "error";
    }

  } catch (err) {
    console.error(err);
    msg.textContent = "Server error. Try again later.";
    msg.className = "error";
  }
});
</script>

</body>
</html>
