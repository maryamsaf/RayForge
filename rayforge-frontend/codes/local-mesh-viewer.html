<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local OBJ mesh viewer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: #1a1a1a;
    color: #e8e8e8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 12px 16px;
    border-bottom: 1px solid #333;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px 16px;
  }
  h1 {
    font-size: 15px;
    font-weight: 600;
    margin-right: auto;
  }
  .hint {
    font-size: 12px;
    color: #888;
    width: 100%;
    margin-top: 4px;
  }
  label.btn {
    display: inline-block;
    padding: 8px 14px;
    background: #2563eb;
    color: #fff;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    user-select: none;
  }
  label.btn:hover { background: #1d4ed8; }
  input[type="file"] {
    position: absolute;
    width: 0;
    height: 0;
    opacity: 0;
    pointer-events: none;
  }
  #status {
    font-size: 12px;
    color: #94a3b8;
  }
  #wrap {
    flex: 1;
    position: relative;
    min-height: 320px;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    outline: none;
  }
  #drop {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    color: #555;
    font-size: 14px;
    z-index: 0;
  }
  #drop.active {
    background: rgba(37, 99, 235, 0.12);
    color: #93c5fd;
    outline: 2px dashed #3b82f6;
    outline-offset: -8px;
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
</head>
<body>
<header>
  <h1>Local OBJ viewer</h1>
  <label class="btn" for="file">Open mesh (.obj)…</label>
  <input id="file" type="file" accept=".obj,text/plain,*/*" />
  <span id="status">No file loaded</span>
  <p class="hint">
    Use this page to open a lung mesh saved on disk (for example <code>scan_*_lung.obj</code>).
    You can also drag the file onto the dark area below. First open needs internet (Three.js from CDN).
  </p>
</header>
<div id="wrap">
  <div id="drop">Drop .obj file here</div>
  <canvas id="c"></canvas>
</div>
<script>
(function () {
  var canvas = document.getElementById("c");
  var wrap = document.getElementById("wrap");
  var drop = document.getElementById("drop");
  var statusEl = document.getElementById("status");
  var fileInput = document.getElementById("file");

  var scene, camera, renderer, controls, root;

  function setStatus(t) {
    statusEl.textContent = t;
  }

  function fitCamera(object) {
    var box = new THREE.Box3().setFromObject(object);
    var size = box.getSize(new THREE.Vector3());
    var center = box.getCenter(new THREE.Vector3());
    var maxDim = Math.max(size.x, size.y, size.z) || 1;
    var dist = maxDim * 1.35;
    camera.position.set(center.x + dist * 0.55, center.y + dist * 0.45, center.z + dist * 0.55);
    camera.near = Math.max(0.01, dist / 200);
    camera.far = dist * 50;
    camera.updateProjectionMatrix();
    controls.target.copy(center);
    controls.update();
  }

  function initThree() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    camera = new THREE.PerspectiveCamera(45, 1, 0.1, 200000);
    renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

    controls = new THREE.OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;

    scene.add(new THREE.HemisphereLight(0x9bb0ff, 0x222222, 0.85));
    var dir = new THREE.DirectionalLight(0xffffff, 1.05);
    dir.position.set(4, 10, 6);
    scene.add(dir);

    root = new THREE.Group();
    scene.add(root);

    function resize() {
      var w = Math.max(1, wrap.clientWidth);
      var h = Math.max(1, wrap.clientHeight);
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    resize();
    window.addEventListener("resize", resize);

    function tick() {
      requestAnimationFrame(tick);
      controls.update();
      renderer.render(scene, camera);
    }
    tick();
  }

  function clearMesh() {
    if (!root) return;
    while (root.children.length) {
      var o = root.children[0];
      root.remove(o);
      o.traverse(function (ch) {
        if (ch.geometry) ch.geometry.dispose();
        if (ch.material) {
          if (Array.isArray(ch.material)) ch.material.forEach(function (m) { m.dispose(); });
          else ch.material.dispose();
        }
      });
    }
  }

  function loadObjText(name, text) {
    if (typeof THREE === "undefined" || !THREE.OBJLoader) {
      setStatus("Three.js failed to load. Check network and reload.");
      return;
    }
    clearMesh();
    setStatus("Parsing " + name + "…");
    setTimeout(function () {
      try {
        var obj = new THREE.OBJLoader().parse(text);
        obj.traverse(function (child) {
          if (child instanceof THREE.Mesh) {
            child.material = new THREE.MeshStandardMaterial({
              color: 0xc8dff0,
              metalness: 0.05,
              roughness: 0.45,
              side: THREE.DoubleSide
            });
          }
        });
        root.add(obj);
        fitCamera(obj);
        drop.style.display = "none";
        setStatus("Showing: " + name);
      } catch (e) {
        setStatus("Error: " + (e && e.message ? e.message : String(e)));
      }
    }, 30);
  }

  function readFile(file) {
    if (!file) return;
    var name = file.name || "mesh.obj";
    if (name.toLowerCase().indexOf(".obj") === -1 && file.type && file.type.indexOf("text") === -1) {
      setStatus("Please choose a .obj file.");
      return;
    }
    setStatus("Reading " + name + "…");
    var r = new FileReader();
    r.onload = function () {
      loadObjText(name, r.result);
    };
    r.onerror = function () {
      setStatus("Could not read file.");
    };
    r.readAsText(file);
  }

  if (typeof THREE === "undefined") {
    setStatus("Three.js not loaded.");
  } else {
    initThree();
  }

  fileInput.addEventListener("change", function () {
    var f = fileInput.files && fileInput.files[0];
    readFile(f);
    fileInput.value = "";
  });

  ["dragenter", "dragover"].forEach(function (ev) {
    wrap.addEventListener(ev, function (e) {
      e.preventDefault();
      e.stopPropagation();
      drop.classList.add("active");
    });
  });
  ["dragleave", "drop"].forEach(function (ev) {
    wrap.addEventListener(ev, function (e) {
      e.preventDefault();
      e.stopPropagation();
      if (ev === "dragleave") drop.classList.remove("active");
    });
  });
  wrap.addEventListener("drop", function (e) {
    drop.classList.remove("active");
    var f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    readFile(f);
  });
})();
</script>
</body>
</html>
